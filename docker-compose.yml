services:
  postgres:
    image: postgres:17-alpine
    container_name: developer-workspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: developer_workspace
      POSTGRES_USER: developer_workspace
      POSTGRES_PASSWORD: Password123
      TZ: Asia/Jakarta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer_workspace -d developer_workspace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
    container_name: developer-workspace-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_DATASOURCE_URL: jdbc:postgresql://postgres:5432/developer_workspace
      APP_DATASOURCE_USERNAME: developer_workspace
      APP_DATASOURCE_PASSWORD: Password123
      APP_CORS_ALLOWED_ORIGINS: http://addorsampang.duckdns.org,http://188.166.206.86,http://188.166.206.86:4200,http://localhost,http://localhost:4200

  frontend:
    build:
      context: ../developer-workspace-frontend
    container_name: developer-workspace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
